name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Vercel CLI
        run: npm install -g vercel
      
      - name: Extract API URL
        run: |
          # Update API_BASE in app.js with your backend URL
          cd frontend
          sed -i "s|const API_BASE = .*|const API_BASE = 'https://zezo-edu-ai-backend.up.railway.app';|" js/app.js
          cat js/app.js | head -20
      
      - name: Deploy to Vercel
        run: |
          cd frontend
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
